<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Harvester Scraper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #1e1e1e;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            border: 1px solid #333;
        }

        .header {
            background: linear-gradient(135deg, #8B0000 0%, #A82020 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .section {
            display: flex;
            flex-direction: column;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #e0e0e0;
            border-bottom: 2px solid #8B0000;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #b0b0b0;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #444;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            background: #2a2a2a;
            color: #e0e0e0;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #8B0000;
            box-shadow: 0 0 0 3px rgba(139, 0, 0, 0.2);
        }

        .schematic-row {
            display: grid;
            grid-template-columns: 1fr 100px auto;
            gap: 10px;
            align-items: end;
            margin-bottom: 10px;
            padding: 10px;
            background: #252525;
            border-radius: 6px;
            border: 1px solid #333;
        }

        .schematic-row input {
            padding: 8px;
            border: 1px solid #444;
            border-radius: 4px;
            font-size: 13px;
            background: #2a2a2a;
            color: #e0e0e0;
        }

        .schematic-row input:focus {
            border-color: #8B0000;
            box-shadow: 0 0 0 2px rgba(139, 0, 0, 0.2);
        }

        .remove-btn {
            padding: 8px 12px;
            background: #cc0000;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s, transform 0.2s;
            font-weight: 600;
        }

        .remove-btn:hover {
            background: #ff0000;
            transform: translateY(-2px);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 24px;
            background: #cc0000;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            white-space: nowrap;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(204, 0, 0, 0.5);
            background: #ff0000;
        }

        button:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #cc0000;
        }

        .btn-secondary:hover {
            background: #ff0000;
        }

        .results {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .result-section {
            background: #252525;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 15px;
        }

        .result-section-title {
            font-weight: 600;
            margin-bottom: 10px;
            color: #e0e0e0;
        }

        .result-textarea {
            width: 100%;
            height: 300px;
            padding: 12px;
            border: 1px solid #444;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            resize: vertical;
            background: #1e1e1e;
            color: #00ff00;
        }

        .result-textarea:focus {
            border-color: #8B0000;
            box-shadow: 0 0 0 2px rgba(139, 0, 0, 0.2);
            outline: none;
        }

        .button-group-bottom {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #8B0000;
            font-weight: 600;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #333;
            border-top: 3px solid #8B0000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .error {
            background: #3d2020;
            color: #ff6b6b;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #8B0000;
            margin-bottom: 10px;
        }

        .success {
            background: #203d20;
            color: #51cf66;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #2d5016;
            margin-bottom: 10px;
        }

        .discord-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
            padding: 12px;
            background: #2a2a2a;
            border-radius: 6px;
            border: 1px solid #333;
        }

        .discord-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
            font-size: 14px;
            color: #b0b0b0;
            transition: color 0.2s;
        }

        .discord-toggle:hover {
            color: #e0e0e0;
        }

        .discord-toggle input[type="radio"] {
            cursor: pointer;
            width: auto;
            accent-color: #8B0000;
        }

        @media (max-width: 900px) {
            .content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🌌 Galaxy Harvester Scraper</h1>
            <p>Extract resources from Star Wars Galaxies schematics</p>
        </div>

        <div class="content">
            <!-- Input Section -->
            <div class="section">
                <h2 class="section-title">📋 Schematics to Scrape</h2>

                <div id="schematics-container"></div>

                <div class="button-group">
                    <button onclick="addSchematic()">+ Add Schematic</button>
                </div>

                <button onclick="scrapeAll()">
                    🔍 Scrape Schematics
                </button>

                <div class="loading" id="loading">
                    <span class="spinner"></span>
                    Scraping schematics...
                </div>
            </div>

            <!-- Results Section -->
            <div class="section">
                <h2 class="section-title">📊 Results</h2>

                <div id="message-container"></div>

                <div class="results">
                    <div class="result-section">
                        <div class="result-section-title">Detailed Breakdown</div>
                        <textarea id="result" class="result-textarea" readonly
                            placeholder="Results will appear here..."></textarea>
                    </div>

                    <div class="result-section">
                        <div class="result-section-title">📱 Discord Export Options</div>
                        <div class="discord-options">
                            <label class="discord-toggle">
                                <input type="radio" name="discord-format" value="without-nitro" checked
                                    onchange="updateDiscordFormat()">
                                Without Nitro (2000 char limit)
                            </label>
                            <label class="discord-toggle">
                                <input type="radio" name="discord-format" value="with-nitro"
                                    onchange="updateDiscordFormat()">
                                With Nitro (4000 char limit)
                            </label>
                        </div>
                        <textarea id="discord-result" class="result-textarea" readonly
                            placeholder="Discord formatted output will appear here..."></textarea>
                    </div>

                    <div class="button-group-bottom">
                        <button onclick="downloadResults()" class="btn-secondary">⬇️ Download as TXT</button>
                        <button onclick="copyToClipboard()" class="btn-secondary">📋 Copy to Clipboard</button>
                        <button onclick="copyDiscordFormat()" class="btn-secondary">💬 Copy Discord Format</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>

</html>
